// ========= CHATBOT CLASS =========
class ChatbotAGEPRODUC {
  constructor() {
    this.toggle = document.getElementById('chatbot-toggle');
    this.window = document.getElementById('chatbot-window');
    this.close = document.getElementById('chatbot-close');
    this.messagesContainer = document.getElementById('chatbot-messages');
    this.input = document.getElementById('chatbot-input');
    this.sendBtn = document.getElementById('chatbot-send');
    this.suggestions = document.querySelectorAll('.suggestion-btn');

    this.init();
  }

  init() {
    this.toggle.addEventListener('click', () => this.toggleWindow());
    this.close.addEventListener('click', () => this.closeWindow());
    this.sendBtn.addEventListener('click', () => this.sendMessage());
    this.input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.sendMessage();
    });

    this.suggestions.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const intent = e.target.dataset.intent;
        this.sendUserIntent(intent);
      });
    });
  }

  toggleWindow() {
    this.window.classList.toggle('active');
    if (this.window.classList.contains('active')) {
      this.input.focus();
    }
  }

  closeWindow() {
    this.window.classList.remove('active');
  }

  sendMessage() {
    const text = this.input.value.trim();
    if (!text) return;

    this.addMessage(text, 'user');
    this.input.value = '';

    this.showTyping();

    setTimeout(() => {
      this.removeTyping();
      const response = this.getResponse(text);
      this.addMessage(response, 'bot');
      this.scrollToBottom();
    }, 800 + Math.random() * 400);
  }

  sendUserIntent(intent) {
    const kb = CHATBOT_KNOWLEDGE_BASE[intent];
    if (kb) {
      this.showTyping();
      setTimeout(() => {
        this.removeTyping();
        this.addMessage(kb.response, 'bot');
        this.scrollToBottom();
      }, 800 + Math.random() * 400);
    }
  }

  addMessage(text, sender) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}-message`;
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.textContent = text;
    
    messageDiv.appendChild(contentDiv);
    this.messagesContainer.appendChild(messageDiv);
    this.scrollToBottom();
  }

  showTyping() {
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message bot-message';
    messageDiv.id = 'typing-indicator';
    
    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    typingDiv.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    
    messageDiv.appendChild(typingDiv);
    this.messagesContainer.appendChild(messageDiv);
    this.scrollToBottom();
  }

  removeTyping() {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
  }

  scrollToBottom() {
    this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
  }

  getResponse(userMessage) {
    const lowerText = userMessage.toLowerCase().trim();

    // Buscar en la knowledge base
    for (const [key, data] of Object.entries(CHATBOT_KNOWLEDGE_BASE)) {
      if (key === 'default') continue;
      
      if (data.keywords && data.keywords.some(keyword => lowerText.includes(keyword))) {
        return data.response;
      }
    }

    // Si no encuentra match, respuesta por defecto
    return CHATBOT_KNOWLEDGE_BASE.default.response;
  }
}

// Inicializar
if (document.readyState === 'loading') {
